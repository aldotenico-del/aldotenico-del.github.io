  <!-- Babel CDN para compilar JSX en el navegador sin compiladores locales -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- KaTeX para renderizar fórmulas matemáticas elegantes estilo LaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <style>
    /* Estilos 3D para animación flip de tarjetas */
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

    // Componente auxiliar para renderizar fórmulas matemáticas en KaTeX
    const MathFormula = ({ math, block = false }) => {
      const containerRef = useRef(null);

      useEffect(() => {
        if (containerRef.current) {
          try {
            katex.render(math, containerRef.current, {
              displayMode: block,
              throwOnError: false
            });
          } catch (error) {
            containerRef.current.textContent = math;
          }
        }
      }, [math, block]);

      return <span ref={containerRef} className={block ? "block my-2" : "inline-block"} />;
    };

        const selected30 = shuffled.slice(0, Math.min(30, shuffled.length));

          if (q.type === 'multiple' || q.type === 'definir') {
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            return { ...q, options: shuffledOptions };
          }
          return q;
        });

        setExamDeck(preparedQuestions);
        setCurrentExamIndex(0);
        setSelectedOption(null);
        setCompletarText('');
        setExamStatus('playing');
      };

        if (!userAnswer || userAnswer.trim() === '') return;

        const currentQuestion = examDeck[currentExamIndex];
        const isCorrect = userAnswer.trim().toLowerCase() === currentQuestion.answer.trim().toLowerCase();

        if (isCorrect) {
          const nextIndex = currentExamIndex + 1;
          setCorrectStreak(prev => {
            const nextStreak = prev + 1;
            if (nextStreak > highScore) setHighScore(nextStreak);
            return nextStreak;
          });

            setExamStatus('success_screen');
          } else {
            setCurrentExamIndex(nextIndex);
            setSelectedOption(null);
            setCompletarText('');
          }

            question: currentQuestion.question,
            userAnswer: userAnswer,
            correctAnswer: currentQuestion.answer,
            explanation: currentQuestion.explanation,
            experiment: currentQuestion.experiment,
            failedIndex: currentExamIndex + 1
          });
          setCorrectStreak(0);

                              }`}
                            >
                              <div className="flex items-center justify-between">
                                <span>{option}</span>
                                <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${
                                  selectedOption === option ? 'border-white bg-indigo-500' : 'border-slate-700'
                                }`}>
                                  {selectedOption === option && <div className="w-1.5 h-1.5 bg-white rounded-full"></div>}
                                </div>
                              </div>
                            </button>
                          ))}
                        </div>
                      )}

                      {/* Respuestas de Completar */}
                      {examDeck[currentExamIndex].type === 'completar' && (
                        <div className="space-y-4">
                          <p className="text-xs text-slate-400 italic">
                            Sugerencia: Haz clic en una opción o escribe la respuesta exacta correspondiente en el recuadro.
                          </p>
                          <div className="grid grid-cols-2 gap-2">
                            {examDeck[currentExamIndex].options.map((opt, i) => (
                              <button
                                key={i}
                                onClick={() => setCompletarText(opt)}
                                className="p-2 text-xs rounded bg-slate-950 hover:bg-slate-800 text-slate-400 hover:text-white border border-slate-800 transition"
                              >
                                {opt}
                              </button>
                            ))}
                          </div>
                          <input
                            type="text"
                            placeholder="Escribe tu respuesta aquí..."
                            value={completarText}
                            onChange={(e) => setCompletarText(e.target.value)}
                            className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl px-4 py-3.5 text-white outline-none text-sm font-medium transition animate-pulse"
                          />
                        </div>
                      )}

                      <div className="pt-4 border-t border-slate-800/60 flex justify-end">
                        <button
                          onClick={() => {
                            const answer = examDeck[currentExamIndex].type === 'completar' ? completarText : selectedOption;
                            handleAnswerSubmit(answer);
                          }}
                          className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-semibold text-sm px-6 py-3 rounded-xl transition duration-150 flex items-center gap-2"
                          disabled={
                            examDeck[currentExamIndex].type === 'completar' 
                              ? !completarText.trim() 
                              : !selectedOption
                          }
                        >
                          Enviar respuesta
                          <Icon name="ArrowRight" className="h-4 w-4" />
                        </button>
                      </div>

                    </div>
                  </div>
                )}

                {/* Examen Completado */}
                {examStatus === 'success_screen' && (
                  <div className="bg-slate-900 border border-emerald-500/30 p-8 rounded-2xl text-center space-y-6 shadow-2xl">
                    <div className="mx-auto w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center border border-emerald-500/20">
                      <Icon name="CheckCircle2" className="h-10 w-10" />
                    </div>

                    <div className="space-y-2">
                      <h3 className="text-3xl font-extrabold text-white">¡Examen Completado! 10/10</h3>
                      <p className="text-slate-400 text-sm max-w-md mx-auto">
                        Increíble. Lograste dominar todos los experimentos teóricos y de cálculo cuantitativo del manual. Estás listo para sacar nota perfecta.
                      </p>
                    </div>

                    <button
                      onClick={() => startNewExam()}
                      className="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-6 py-3 rounded-xl transition shadow-lg shadow-emerald-500/10"
                    >
                      Volver a desafiar con preguntas al azar
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* MODAL DE FALLO (CASTIGO DE REINICIO) */}
            {examStatus === 'failed_modal' && failedQuestionDetails && (
              <div className="fixed inset-0 z-50 overflow-y-auto bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div className="bg-slate-900 border-2 border-rose-500/50 max-w-xl w-full rounded-2xl overflow-hidden shadow-2xl">
                  
                  <div className="bg-rose-500/10 border-b border-rose-500/20 px-6 py-5 flex items-center gap-3">
                    <div className="bg-rose-500 text-white p-1.5 rounded-lg">
                      <Icon name="XCircle" className="h-5 w-5" />
                    </div>
                    <div>
                      <h3 className="text-base font-bold text-rose-400">¡Respuesta Incorrecta!</h3>
                      <p className="text-xs text-slate-400">Has fallado en la pregunta {failedQuestionDetails.failedIndex}</p>
                    </div>
                  </div>

                  <div className="p-6 space-y-4">
                    <div className="space-y-1">
                      <span className="text-[10px] text-slate-500 uppercase tracking-widest font-extrabold">{failedQuestionDetails.experiment}</span>
                      <p className="text-sm font-semibold text-slate-200">"{failedQuestionDetails.question}"</p>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
                      <div className="bg-slate-950 p-3 rounded-lg border border-slate-800">
                        <span className="text-slate-500 block mb-1 uppercase font-bold">Tu respuesta:</span>
                        <strong className="text-rose-400 font-mono">{failedQuestionDetails.userAnswer}</strong>
                      </div>
                      <div className="bg-slate-950 p-3 rounded-lg border border-slate-800">
                        <span className="text-slate-500 block mb-1 uppercase font-bold">Respuesta correcta:</span>
                        <strong className="text-emerald-400 font-mono">{failedQuestionDetails.correctAnswer}</strong>
                      </div>
                    </div>

                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-1.5">
                      <span className="text-[10px] text-indigo-400 uppercase tracking-widest font-extrabold flex items-center gap-1.5">
                        <Icon name="HelpCircle" className="h-3.5 w-3.5" /> Explicación Teórica / Desarrollo Matemático (Estilo UCE)
                      </span>
                      <p className="text-xs text-slate-300 leading-relaxed">
                        {failedQuestionDetails.explanation}
                      </p>
                    </div>

                    <div className="bg-rose-500/5 p-4 rounded-xl border border-rose-500/10 text-center">
                      <p className="text-xs text-rose-300 leading-normal">
                        <strong>¡Regla de la prueba!</strong> Para asegurar la asimilación conceptual de tu error, regresas al inicio de la prueba y se barajará un mazo nuevo de 30 preguntas de forma aleatoria.
                      </p>
                    </div>
                  </div>

                  <div className="bg-slate-950 px-6 py-4 border-t border-slate-800 flex justify-end">
                    <button
                      onClick={handleCloseFailureModal}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm px-6 py-2.5 rounded-xl transition flex items-center gap-2 shadow-lg shadow-indigo-600/10"
                    >
                      <Icon name="RotateCcw" className="h-4 w-4" />
                      Volver a empezar
                    </button>
                  </div>

                </div>
              </div>
            )}

            {/* 4. SECCIÓN: SUBIR MÁS MATERIAL */}
            {activeTab === 'subir-material' && (
              <div className="max-w-3xl mx-auto space-y-6 animate-fadeIn">
                <div className="space-y-2 text-center max-w-xl mx-auto">
                  <span className="text-xs font-semibold uppercase tracking-widest text-indigo-400 bg-indigo-500/10 px-3 py-1 rounded-full">
                    Añade Apuntes
                  </span>
                  <h2 className="text-2xl font-bold text-white">Generador de Pruebas Personalizadas</h2>
                  <p className="text-xs text-slate-400">
                    Pega tus propios apuntes o fragmentos de manuales de física aquí. La aplicación generará automáticamente nuevas preguntas y las incorporará en el simulador.
                  </p>
                </div>

                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl space-y-4 shadow-xl">
                  <textarea
                    rows="8"
                    placeholder="Pega tu material aquí..."
                    value={customMaterialText}
                    onChange={(e) => setCustomMaterialText(e.target.value)}
                    className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl p-4 text-sm text-slate-200 placeholder-slate-600 outline-none transition"
                  ></textarea>

                  <div className="flex justify-between items-center gap-4">
                    <span className="text-xs text-slate-500">Mínimo sugerido: 50 caracteres</span>
                    <button
                      onClick={handleProcessMaterial}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm px-6 py-3 rounded-xl flex items-center gap-2 transition"
                    >
                      <Icon name="Sparkles" className="h-4 w-4" />
                      Procesar Apuntes
                    </button>
                  </div>

                  {uploadMessage && (
                    <div className="p-4 rounded-xl text-xs border bg-indigo-500/5 border-indigo-500/20 text-indigo-300">
                      {uploadMessage}
                    </div>
                  )}
                </div>
              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="border-t border-slate-800/80 bg-slate-950/40 py-6 text-center text-xs text-slate-500 px-4 mt-auto">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <p>© 2026 Laboratorio de Física FIS-011. Universidad Central del Este (UCE).</p>
              <div className="flex gap-4">
                <span>San Pedro de Macorís, RD</span>
                <span>•</span>
                <span>Entrenador de Exámenes Premium</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
